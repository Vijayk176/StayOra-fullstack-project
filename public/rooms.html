<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms - Stayora</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div id="navbar"></div>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 px-0" id="sidebar"></div>

    <div class="col-md-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 id="pageTitle">Rooms</h2>
        <button class="btn btn-stayora" id="addBtn">+ Add Room</button>
      </div>

      <input type="text" class="form-control mb-3 w-50" id="searchInput" placeholder="Search by room number...">

      <div class="card p-3 shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="recordModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Room</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="recordForm"></form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-stayora" id="saveBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/crud.js"></script>
<script>
  initCrudPage({
    pageKey: 'rooms',
    title: 'Room',
    endpoint: '/rooms',
    pk: 'room_id',
    columns: [
      { key: 'room_id', label: 'ID' },
      { key: 'room_number', label: 'Room No.' },
      { key: 'room_type_id', label: 'Room Type ID' },
      { key: 'floor_number', label: 'Floor' },
      { key: 'status', label: 'Status', badge: true }
    ],
    formFields: [
      { key: 'room_number', label: 'Room Number', required: true },
      { key: 'room_type_id', label: 'Room Type ID (1=Standard,2=Deluxe,3=Suite,4=Family)', type: 'number', required: true },
      { key: 'floor_number', label: 'Floor Number', type: 'number', required: true },
      { key: 'status', label: 'Status', type: 'select', required: true, options: [
        { value: 'Available', label: 'Available' },
        { value: 'Occupied', label: 'Occupied' },
        { value: 'Maintenance', label: 'Maintenance' }
      ]},
      { key: 'image_url', label: 'Image URL' }
    ]
  });
</script>
</body>
</html>
