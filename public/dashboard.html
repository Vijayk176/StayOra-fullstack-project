<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Stayora</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div id="navbar"></div>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 px-0" id="sidebar"></div>

    <div class="col-md-10 p-4">
      <h2 class="mb-4">📊 Dashboard</h2>

      <div class="row g-3 mb-4">
        <div class="col-md-2-4 col-6 col-md">
          <div class="card card-stat p-3 shadow-sm">
            <small class="text-muted">Total Bookings</small>
            <h3 id="statBookings">-</h3>
          </div>
        </div>
        <div class="col-6 col-md">
          <div class="card card-stat p-3 shadow-sm">
            <small class="text-muted">Total Revenue</small>
            <h3 id="statRevenue">-</h3>
          </div>
        </div>
        <div class="col-6 col-md">
          <div class="card card-stat p-3 shadow-sm">
            <small class="text-muted">Total Guests</small>
            <h3 id="statGuests">-</h3>
          </div>
        </div>
        <div class="col-6 col-md">
          <div class="card card-stat p-3 shadow-sm">
            <small class="text-muted">Available Rooms</small>
            <h3 id="statAvailable">-</h3>
          </div>
        </div>
        <div class="col-6 col-md">
          <div class="card card-stat p-3 shadow-sm">
            <small class="text-muted">Occupied Rooms</small>
            <h3 id="statOccupied">-</h3>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <div class="card p-3 shadow-sm">
            <h5>Monthly Bookings</h5>
            <canvas id="bookingsChart" height="220"></canvas>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 shadow-sm">
            <h5>Monthly Revenue Trend</h5>
            <canvas id="revenueChart" height="220"></canvas>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <div class="card p-3 shadow-sm">
            <h5>Room Status</h5>
            <canvas id="roomsPieChart" height="220"></canvas>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 shadow-sm">
            <h5>Top Services Used</h5>
            <canvas id="servicesChart" height="220"></canvas>
          </div>
        </div>
      </div>

      <div class="card p-3 shadow-sm">
        <h5>Recent Bookings</h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr><th>ID</th><th>Guest</th><th>Room</th><th>Check-In</th><th>Check-Out</th><th>Amount</th><th>Status</th></tr>
            </thead>
            <tbody id="recentBookingsBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
