<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Stayora</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div id="navbar"></div>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 px-0" id="sidebar"></div>

    <div class="col-md-10 p-4">
      <h2 class="mb-4">👤 My Profile</h2>
      <div class="card p-4 shadow-sm" style="max-width: 500px;">
        <table class="table">
          <tr><th>Full Name</th><td id="p_full_name">-</td></tr>
          <tr><th>Email</th><td id="p_email">-</td></tr>
          <tr><th>Role</th><td id="p_role">-</td></tr>
          <tr><th>Account Created</th><td id="p_created">-</td></tr>
          <tr><th>Status</th><td id="p_status">-</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    requireAuth();
    renderAdminLayout('profile');
    try {
      const res = await apiRequest('/auth/profile');
      const u = res.data;
      document.getElementById('p_full_name').textContent = u.full_name;
      document.getElementById('p_email').textContent = u.email;
      document.getElementById('p_role').textContent = u.role_name;
      document.getElementById('p_created').textContent = new Date(u.created_at).toLocaleString();
      document.getElementById('p_status').textContent = u.is_active ? 'Active' : 'Inactive';
    } catch (err) {
      console.error(err);
    }
  });
</script>
</body>
</html>
